<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>

  <!-- GitHub-like styling -->
  <style>
    body {
      max-width: 800px;
      margin: auto;
      padding: 40px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      line-height: 1.5;
      color: #24292f;
      background-color: #ffffff;
    }

    h1, h2, h3 {
      font-weight: 600;
      border-bottom: 1px solid #eaecef;
      padding-bottom: 0.3em;
      margin-top: 24px;
    }

    h2 {
      font-size: 1.8rem;
      color: #0969da;
    }

    p {
      margin: 10px 0;
    }

    a {
      color: #0969da;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    ul {
      padding-left: 20px;
    }

    hr {
      border: none;
      border-top: 1px solid #eaecef;
      margin: 20px 0;
    }
  </style>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['\\[', '\\]']]
      },
      chtml: {
        displayAlign: 'left'
      }
    };
  </script>

  <script
    id="MathJax-script"
    async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js">
  </script>

</head>

<body>
  {{ content }}
</body>
</html>
